<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Yomiku</title>
  <style>
    :root { color-scheme: dark; --bg:#0b1020; --card:#141b34; --text:#f7f7ff; --muted:#b9c0d4; --accent:#9b7cff; }
    body { margin:0; min-height:100vh; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; background:radial-gradient(circle at top,#202a55 0,#0b1020 44%,#060914 100%); color:var(--text); display:flex; align-items:center; justify-content:center; padding:32px; }
    main { width:min(760px,100%); background:rgba(20,27,52,.78); border:1px solid rgba(255,255,255,.12); border-radius:28px; padding:34px; box-shadow:0 24px 80px rgba(0,0,0,.35); }
    h1 { font-size:44px; margin:0 0 12px; letter-spacing:-.04em; }
    p { color:var(--muted); font-size:18px; line-height:1.6; margin:0 0 24px; }
    nav { display:flex; flex-wrap:wrap; gap:12px; }
    a { color:var(--text); text-decoration:none; background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.12); padding:12px 16px; border-radius:999px; font-weight:700; }
    a:hover { background:rgba(155,124,255,.22); border-color:rgba(155,124,255,.5); }
  </style>
</head>
<body>
  <main>
    <h1>Yomiku</h1>
    <p>Private translated chats for people who want to communicate across languages.</p>
    <nav>
      <a href="https://apps.apple.com/">Download on the App Store</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="support.html">Support</a>
      <a href="disclaimer.html">Disclaimer</a>
    </nav>
  </main>
</body>
</html>
