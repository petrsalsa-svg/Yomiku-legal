<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LumoChat</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #090914;
      color: #f7f2ff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(167,139,250,0.35), transparent 34rem),
        radial-gradient(circle at bottom right, rgba(45,212,191,0.20), transparent 32rem),
        #090914;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(760px, 100%);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 24px 70px rgba(0,0,0,0.35);
      border-radius: 28px;
      padding: 34px;
      backdrop-filter: blur(18px);
      text-align: center;
    }

    .mark {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      margin: 0 auto 18px;
      background: linear-gradient(135deg, #a78bfa, #2dd4bf);
      box-shadow: 0 16px 36px rgba(124,58,237,0.35);
    }

    h1 {
      font-size: clamp(38px, 7vw, 62px);
      margin: 0 0 10px;
      letter-spacing: -0.06em;
    }

    p {
      color: rgba(247,242,255,0.78);
      font-size: 17px;
      line-height: 1.6;
      margin: 0 0 24px;
    }

    a {
      display: block;
      color: white;
      text-decoration: none;
      font-weight: 800;
      padding: 15px 18px;
      border-radius: 16px;
      margin-top: 12px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.14);
    }

    a.primary {
      background: linear-gradient(135deg, #a78bfa, #7c3aed);
      box-shadow: 0 14px 34px rgba(124,58,237,0.35);
      border: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark"></div>
    <h1>LumoChat</h1>
    <p>Private translated chats for people who want to communicate across languages.</p>

    <a class="primary" href="https://apps.apple.com/app/id6780254715">Download on the App Store</a>
    <a href="privacy.html">Privacy Policy</a>
    <a href="support.html">Support</a>
    <a href="disclaimer.html">Disclaimer</a>
  </main>
</body>
</html>
